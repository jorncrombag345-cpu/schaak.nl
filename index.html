<!DOCTYPE html>
<html lang="nl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chess Arena</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#0b1020,#1d3557);color:#fff;overflow:hidden}
.bg{position:fixed;inset:0;background:radial-gradient(circle at 20% 20%,#3b82f633,transparent 30%),radial-gradient(circle at 80% 70%,#22c55e22,transparent 25%)}
.card{position:relative;max-width:900px;margin:8vh auto;padding:50px;border-radius:24px;background:rgba(255,255,255,.08);backdrop-filter:blur(16px);box-shadow:0 20px 50px #0008;text-align:center}
h1{font-size:64px}.sub{margin:15px 0 35px;color:#dbeafe;font-size:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:18px}
.btn{padding:18px;border-radius:14px;text-decoration:none;color:#fff;font-weight:bold;display:block;transition:.25s}
.green{background:#22c55e}.blue{background:#3b82f6}.gold{background:#f59e0b}.gray{background:#475569}
.btn:hover{transform:translateY(-4px) scale(1.03)}
.stats{display:flex;justify-content:center;gap:40px;margin-top:35px;flex-wrap:wrap}.stat{font-size:28px}.label{font-size:14px;color:#cbd5e1}
footer{margin-top:30px;color:#cbd5e1}
.p{position:absolute;width:6px;height:6px;background:#fff;border-radius:50%;opacity:.4;animation:f 12s linear infinite}
@keyframes f{from{transform:translateY(100vh)}to{transform:translateY(-120vh)}}
</style></head><body><div class="bg"></div>
<script>
for(let i=0;i<80;i++){let d=document.createElement('div');d.className='p';d.style.left=Math.random()*100+'vw';d.style.animationDuration=8+Math.random()*10+'s';d.style.animationDelay=(-Math.random()*15)+'s';document.body.appendChild(d);}
</script>
<div class="card">
<h1>♚ Chess Arena</h1>
<div class="sub">Speel online schaakpartijen tegen je vrienden.</div>
<div class="grid">
<a class="btn green" href="#">▶ Speel Online</a>
<a class="btn blue" href="#">👥 Vrienden</a>
<a class="btn gold" href="#">🏆 Leaderboard</a>
<a class="btn gray" href="#">👤 Profiel</a>
</div>
<div class="stats">
<div><div class="stat" id="a">1245</div><div class="label">Spelers online</div></div>
<div><div class="stat" id="b">32891</div><div class="label">Partijen vandaag</div></div>
</div>
<footer>© 2026 Chess Arena</footer>
</div>
<script>
setInterval(()=>{a.textContent=1200+Math.floor(Math.random()*150);b.textContent=32800+Math.floor(Math.random()*500)},2000);
</script></body></html>
