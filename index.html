<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Arena</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#0f172a,#1e293b);
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            text-align:center;
            background:#1f2937;
            padding:50px;
            border-radius:20px;
            box-shadow:0 0 30px rgba(0,0,0,.4);
            width:90%;
            max-width:600px;
        }

        h1{
            font-size:55px;
            margin-bottom:15px;
        }

        p{
            color:#cbd5e1;
            margin-bottom:35px;
            font-size:18px;
        }

        .buttons{
            display:flex;
            flex-direction:column;
            gap:15px;
        }

        button{
            padding:18px;
            border:none;
            border-radius:12px;
            font-size:20px;
            cursor:pointer;
            transition:.25s;
        }

        .play{
            background:#22c55e;
            color:white;
        }

        .play:hover{
            background:#16a34a;
            transform:scale(1.03);
        }

        .friends{
            background:#3b82f6;
            color:white;
        }

        .friends:hover{
            background:#2563eb;
            transform:scale(1.03);
        }

        .profile{
            background:#f59e0b;
            color:white;
        }

        .profile:hover{
            background:#d97706;
            transform:scale(1.03);
        }

        footer{
            margin-top:30px;
            color:#94a3b8;
            font-size:14px;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>♟ Chess Arena</h1>

    <p>Speel online schaakpartijen tegen je vrienden.</p>

    <div class="buttons">
        <button class="play">▶ Speel Nu</button>
        <button class="friends">👥 Vrienden</button>
        <button class="profile">👤 Profiel</button>
    </div>

    <footer>
        © 2026 Chess Arena
    </footer>

</div>

</body>
</html>
